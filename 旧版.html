<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天青 · gal 界面引擎 v2</title>
<style>
/* ===== 外观层 · 晴日花田玻璃拟态。iframe 里渲染，故用 body 级 + id，无需防冲突 ===== */
:root{
  --main:#8dd4e0;                                    /* 主色调（#FF8DD4E0 → ARGB 读作青色） */
  --ink:#20384a;--ink-soft:#5c7486;--accent:#46b6cf;--accent-deep:#2d93ad;
  --sky-1:#d4eef6;--sky-2:#eaf7dd;
  --glass:rgba(255,255,255,.5);--glass-line:rgba(255,255,255,.6);
  --dlg-tint:rgba(15,20,28,.48);                     /* 深色叠加层：blur 之上再叠 ~48% 深色，把区域亮度拉到可控范围（90% galgame 方案）*/
  --dlg-blur:16px;
  --dm-w:50%;              /* 弹幕框宽度。原来 91% 横贯整屏挡住天青 → 改成二分之一。想再窄/再宽就改这一个数 */                                   /* 毛玻璃模糊量；「无磨砂/全透」档会设成 0px */
  --gold:#e6a94a;--shadow:0 12px 36px rgba(40,90,110,.25);--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;color:var(--ink);
  background:transparent;display:flex;justify-content:center;padding:6px}

#stage{position:relative;width:min(880px,100%);aspect-ratio:16/10;border-radius:20px;overflow:hidden;
  box-shadow:0 18px 54px rgba(0,0,0,.35);background:linear-gradient(160deg,var(--sky-1),var(--sky-2));user-select:none}

/* 背景（读 MVU 的 地点+时段 决定） */
#bg{position:absolute;inset:0;transition:opacity .5s;background-size:cover;background-position:center}

/* 立绘：双层交叉淡入 */
#sprites{position:absolute;left:0;right:0;bottom:0;height:90%;z-index:3;filter:drop-shadow(0 8px 22px rgba(40,95,115,.35));pointer-events:none}
.layer{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:100%;opacity:0;transition:opacity .4s ease;will-change:opacity}
.layer.show{opacity:1}
.layer img{height:100%;width:auto;display:block;transform-origin:bottom center}

/* 入场特效池（12，随机不重复；AI 不写动画名） */
@keyframes fx-soft{from{transform:translateY(7px)}to{transform:none}}
@keyframes fx-pop{0%{transform:scale(.95)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes fx-bounce{0%{transform:translateY(0)}30%{transform:translateY(-14px)}52%{transform:translateY(0)}72%{transform:translateY(-6px)}100%{transform:translateY(0)}}
@keyframes fx-sway{0%{transform:rotate(0)}26%{transform:rotate(-3.2deg)}56%{transform:rotate(3.2deg)}80%{transform:rotate(-1.8deg)}100%{transform:rotate(0)}}
@keyframes fx-slideL{0%{transform:translateX(-34px)}100%{transform:translateX(0)}}
@keyframes fx-slideR{0%{transform:translateX(34px)}100%{transform:translateX(0)}}
@keyframes fx-drop{0%{transform:translateY(-26px)}70%{transform:translateY(4px)}100%{transform:translateY(0)}}
@keyframes fx-zoomIn{0%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes fx-zoomOut{0%{transform:scale(.86)}100%{transform:scale(1)}}
@keyframes fx-tilt{0%{transform:rotate(-5deg) scale(.97)}100%{transform:rotate(0) scale(1)}}
@keyframes fx-shake{0%{transform:translateX(0)}18%{transform:translateX(-6px)}36%{transform:translateX(5px)}54%{transform:translateX(-4px)}72%{transform:translateX(3px)}100%{transform:translateX(0)}}
@keyframes fx-glow{0%{filter:brightness(1.55) saturate(1.1);transform:scale(1.03)}100%{filter:brightness(1);transform:scale(1)}}
.fx-soft img{animation:fx-soft .45s ease both}
.fx-pop img{animation:fx-pop .5s cubic-bezier(.34,1.56,.64,1) both}
.fx-bounce img{animation:fx-bounce .7s ease both}
.fx-sway img{animation:fx-sway .8s ease both}
.fx-slideL img{animation:fx-slideL .5s cubic-bezier(.22,1,.36,1) both}
.fx-slideR img{animation:fx-slideR .5s cubic-bezier(.22,1,.36,1) both}
.fx-drop img{animation:fx-drop .6s cubic-bezier(.34,1.4,.64,1) both}
.fx-zoomIn img{animation:fx-zoomIn .5s cubic-bezier(.22,1,.36,1) both}
.fx-zoomOut img{animation:fx-zoomOut .5s cubic-bezier(.22,1,.36,1) both}
.fx-tilt img{animation:fx-tilt .55s cubic-bezier(.34,1.3,.64,1) both}
.fx-shake img{animation:fx-shake .5s ease both}
.fx-glow img{animation:fx-glow .6s ease both}
@media(prefers-reduced-motion:reduce){.layer img{animation:none!important}}

/* CG + 文生图按钮 */
#cg{position:absolute;inset:0;z-index:2;opacity:0}
#cgbg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
#cgmain{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
#cg.show{opacity:1;animation:cg-in .8s ease both}
@keyframes cg-in{0%{opacity:0;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
#cgPh{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:#fff;font-size:14px;background:linear-gradient(135deg,#7ec98f,#4fa36b)}
/* 文生图的按钮/面板已搬去小手机（相册 → ✨生成）。gal 只留「接图」通道，见文件末尾的 storage 监听。 */

/* 状态栏：环境在上、内心 OS 压底 */
#status{position:absolute;top:14px;right:14px;z-index:7;width:min(46%,270px);background:var(--dlg-tint);border:1px solid rgba(255,255,255,.16);border-radius:var(--r);box-shadow:0 12px 34px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(var(--dlg-blur)) saturate(1.4);-webkit-backdrop-filter:blur(var(--dlg-blur)) saturate(1.4);padding:11px 13px;font-size:13px}
#status .env{color:rgba(240,244,248,.95);line-height:1.6;display:flex;gap:6px}
#status .inner{margin-top:9px;padding-top:9px;border-top:1px dashed rgba(255,255,255,.25);color:rgba(220,228,235,.82);font-style:italic;line-height:1.6;display:flex;gap:6px}
#status .i{opacity:.85}
#status .inner .i{font-style:normal}
/* 状态框折叠按钮：展开时是右上角小「–」；收起后整框缩成一个 💭 小圆，点它再展开 */
#status .stog{position:absolute;top:6px;right:7px;z-index:2;width:22px;height:22px;padding:0;border:none;border-radius:6px;background:rgba(255,255,255,.14);color:#eef2f6;font-size:15px;line-height:1;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center}
#status .stog:hover{background:rgba(255,255,255,.26)}
#status.collapsed{width:auto;min-width:0;padding:0;background:transparent;border:none;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none}
#status.collapsed .loc,#status.collapsed .env,#status.collapsed .inner{display:none}
#status.collapsed .stog{position:static;width:40px;height:40px;border-radius:12px;font-size:18px;background:var(--dlg-tint);border:1px solid rgba(255,255,255,.2);box-shadow:0 6px 18px rgba(0,0,0,.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

/* 对话框 + 左上 时间·地点 */
#dialogue{position:absolute;left:18px;right:18px;bottom:18px;z-index:8;background:var(--dlg-tint);border:1px solid rgba(255,255,255,.16);border-radius:var(--r);box-shadow:0 12px 34px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(var(--dlg-blur)) saturate(1.4);-webkit-backdrop-filter:blur(var(--dlg-blur)) saturate(1.4);padding:22px 20px 18px;min-height:108px;cursor:pointer}
#status .loc{display:flex;flex-wrap:wrap;gap:4px 12px;color:rgba(240,244,248,.95);font-weight:600;padding-bottom:9px;margin-bottom:9px;border-bottom:1px dashed rgba(255,255,255,.25);letter-spacing:.02em}
#status .loc .p{color:var(--main)}
#speaker{display:inline-block;font-weight:700;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-deep));padding:3px 15px;border-radius:999px;margin-bottom:8px;letter-spacing:.05em;box-shadow:0 3px 10px rgba(45,147,173,.45);min-height:26px}
#speaker.narrator{background:transparent;color:rgba(255,255,255,.72);box-shadow:none;padding-left:2px;font-weight:600;font-size:13px;letter-spacing:.1em}
#text{font-size:16px;line-height:1.85;color:#f2f5f8;min-height:34px;text-shadow:0 1px 2px rgba(0,0,0,.9),0 0 5px rgba(0,0,0,.6)}
#text.tianqing{color:var(--main);text-shadow:0 1px 2px rgba(0,0,0,.9),0 0 5px rgba(0,0,0,.6)}
#hint{position:absolute;right:16px;bottom:10px;font-size:11.5px;color:rgba(255,255,255,.6);opacity:.85;animation:blink 1.4s infinite}
@keyframes blink{50%{opacity:.25}}

/* 选项 */
#choices{position:absolute;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:rgba(18,42,52,.42);backdrop-filter:blur(3px);padding:22px}
#choices .q{color:#fff;font-size:15px;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.4)}
#choices button{width:min(440px,92%);padding:13px 18px;border:1px solid var(--glass-line);border-radius:11px;background:var(--glass);color:var(--ink);font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);transition:.2s}
#choices button:hover{background:#fff;transform:translateY(-2px);color:var(--accent)}

/* ===== CG 手动切换模式 =====
   进入后：#stage 加 .cgmode → 藏对话框+状态框、露出压图文字层 #cgText 和底部回看条 #cgNav。
   文字直接描边压在 CG 上，后一句盖前一句(淡入)；底部 ‹ 第N句/共M句 › 左右回看。 */
#cgText{position:absolute;left:6%;right:6%;bottom:13%;z-index:9;display:none;flex-direction:column;align-items:center;text-align:center;pointer-events:none}
#stage.cgmode #cgText,#stage.cgauto #cgText{display:flex}
#cgSpk{display:none;font-weight:700;font-size:14px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-deep));padding:3px 15px;border-radius:999px;margin-bottom:9px;letter-spacing:.05em;box-shadow:0 3px 12px rgba(0,0,0,.5)}
#cgSpk.on{display:inline-block}
#cgLine{font-size:18px;line-height:1.7;color:#fff;font-weight:600;max-width:640px;animation:cgtxt .32s ease both;text-shadow:0 0 3px #000,0 0 3px #000,0 2px 6px rgba(0,0,0,.9),0 0 14px rgba(0,0,0,.7)}
#cgLine.tq{color:var(--main)}
#cgLine.narr{font-style:italic;font-weight:500;color:rgba(255,255,255,.94)}
@keyframes cgtxt{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#cgNav{position:absolute;left:0;right:0;bottom:4.5%;z-index:9;display:none;align-items:center;justify-content:center;gap:16px}
#stage.cgmode #cgNav{display:flex}
#cgNav button{width:38px;height:38px;border:1px solid rgba(255,255,255,.3);border-radius:50%;background:rgba(18,24,32,.6);color:#fff;font-size:18px;line-height:1;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-family:inherit}
#cgNav button:disabled{opacity:.3;cursor:default}
#cgNav .cnt{color:#fff;font-size:13px;font-weight:600;min-width:64px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.9);letter-spacing:.05em}
#cgNav .cnt b{color:var(--main);font-size:15px}
#stage.cgmode #dialogue,#stage.cgmode #status,#stage.cgauto #dialogue,#stage.cgauto #status{display:none!important}

/* ==================== 直播模式 ====================
   AI 吐 <live> → #stage 加 .live。布局：左上直播条 / 中间立绘 / 天青字幕 / 弹幕玻璃框 / 底部发弹幕栏。
   隐藏：对话框、CG 切换按钮、左右箭头、CG 层。右上状态框【只留内心 OS】那一行。 */
#stage.live #dialogue,#stage.live #choices,#stage.live .nav,#stage.live #cgNav,#stage.live #cgText,#stage.live #cg,#stage.live #cgTog{display:none!important}
/* 直播模式：状态框【整个】藏掉。原来只藏了 .loc/.env/.stog 三个子元素，容器还在 →
   屏幕右上角剩一个空玻璃壳；要是之前折叠过它，.collapsed 连 .inner 也藏了 → 一个纯空盒子。
   时间/地点已经在直播条里了，直播时不需要这个面板。 */
#stage.live #status{display:none!important}
#stage.live #sprites{height:78%;bottom:auto;top:6%}                                                    /* 立绘上移，给弹幕框腾地方 */

#liveBar,#liveTitle,#liveSub,#liveDm,#liveInput,#liveReplay{display:none}
#stage.live #liveBar,#stage.live #liveTitle,#stage.live #liveSub,#stage.live #liveDm,#stage.live #liveInput{display:flex}
#stage.live.replay #liveReplay{display:flex}
#stage.live.replay #liveInput{display:none}                                                            /* 回放里不能发弹幕 */

/* 左上：🔴LIVE · 时间 · 人数 · 热度 */
#liveBar{position:absolute;top:12px;left:12px;z-index:14;align-items:center;gap:8px;padding:7px 13px;border-radius:10px;cursor:pointer;
  background:rgba(12,16,22,.62);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
  color:#eef3f7;font-size:12.5px;font-weight:600;letter-spacing:.02em;box-shadow:0 6px 20px rgba(0,0,0,.42);white-space:nowrap}
#liveBar b{color:#ff5f6b;letter-spacing:.09em;font-size:11.5px}
#liveBar .dot{width:7px;height:7px;border-radius:50%;background:#ff4d5a;box-shadow:0 0 8px #ff4d5a;animation:lvpulse 1.4s infinite}
#liveBar .sep{width:1px;height:11px;background:rgba(255,255,255,.2)}
@keyframes lvpulse{0%,100%{opacity:1}50%{opacity:.25}}

/* 标题条（形式 + 背景） */
/* 收起态：直播条缩成一个 🔴LIVE 小胶囊，标题一起收掉。点它展开/收起，状态记到 localStorage 跨消息保留 */
#stage.live.barmin #liveBar{gap:6px;padding:6px 10px}
#stage.live.barmin #liveBar .sep,#stage.live.barmin #liveClock,#stage.live.barmin #liveViewers,#stage.live.barmin #liveHeat{display:none}
#stage.live.barmin #liveTitle{display:none}
#liveTitle{position:absolute;top:52px;left:12px;z-index:14;padding:4px 11px;border-radius:8px;background:rgba(12,16,22,.5);
  border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  color:rgba(255,255,255,.9);font-size:11.5px;font-weight:500;white-space:nowrap}

/* 天青字幕：压在立绘下方，后一句盖前一句（复用 CG 模式的淡入手法） */
#liveSub{position:absolute;left:8%;right:8%;bottom:calc(30% + 78px);z-index:13;justify-content:center;text-align:center;pointer-events:none;
  font-size:17px;line-height:1.65;font-weight:600;color:var(--main);animation:cgtxt .3s ease both;
  text-shadow:0 0 3px #000,0 0 3px #000,0 2px 7px rgba(0,0,0,.92),0 0 15px rgba(0,0,0,.65)}
#liveSub.narr{color:rgba(255,255,255,.9);font-style:italic;font-weight:500;font-size:15px}

/* 弹幕框：半透明黑玻璃，新弹幕从下面冒出来、自动滚到底 */
#liveDm{position:absolute;left:4.5%;width:var(--dm-w);right:auto;bottom:66px;height:30%;z-index:13;flex-direction:column;gap:5px;padding:10px 12px;overflow-y:auto;
  border-radius:13px;background:rgba(8,11,16,.5);border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.4);scroll-behavior:smooth}
#liveDm::-webkit-scrollbar{width:4px}#liveDm::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
/* 弹幕框的隐藏钮。位置：【弹幕框右边的空白区】，和框底对齐。
   —— 不能放框的正上方：那儿是字幕（#liveSub 在 bottom:30%+78px），会压住。
   —— 也不能塞进 #liveDm 里：那个 div 的内容是每条弹幕重绘的，按钮会被冲掉。
   弹幕框只占一半宽（--dm-w），右边正好是空的。收起后按钮留在原地当「叫回来」的入口。 */
#dmTog{position:absolute;left:calc(4.5% + var(--dm-w) + 8px);bottom:66px;z-index:15;display:none;
  width:30px;height:30px;align-items:center;justify-content:center;font-size:14px;cursor:pointer;
  background:rgba(12,16,22,.66);border:1px solid rgba(255,255,255,.16);border-radius:9px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 3px 12px rgba(0,0,0,.3);
  transition:opacity .18s,transform .12s}
#stage.live #dmTog{display:flex}
#dmTog:active{transform:scale(.88)}
#stage.live.dmoff #liveDm{display:none}                    /* 收起：弹幕框藏掉 */
#stage.live.dmoff #dmTog{left:4.5%;opacity:.8}             /* 按钮挪到左下角（框原来的起点），当入口 */
#stage.live.replay #dmTog{display:none}                    /* 回放里不用收弹幕（本来也发不了） */
#liveDm .dm{font-size:12.5px;line-height:1.5;color:#e8eef3;animation:dmin .3s ease both;word-break:break-word;flex-shrink:0}
#liveDm .dm .n{color:#8fa8bb;margin-right:7px;font-weight:500}                                          /* 观众 ID */
#liveDm .dm.me .n{color:var(--main);font-weight:700}                                                    /* {{user}} 自己发的 */
#liveDm .dm.sys{color:#7f93a3;font-size:11.5px;font-style:italic;text-align:center}
@keyframes dmin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* SC 卡片：左侧色条 + 金额徽章，颜色按金额落档（B站真实档位配色，见 JS 的 SC_TIERS） */
#liveDm .sc{flex-shrink:0;border-radius:8px;overflow:hidden;animation:scin .42s cubic-bezier(.34,1.4,.64,1) both;box-shadow:0 3px 12px rgba(0,0,0,.35)}
#liveDm .sc .top{display:flex;align-items:center;gap:7px;padding:5px 9px;font-size:12px;font-weight:700;color:#fff}
#liveDm .sc .top .y{background:rgba(255,255,255,.22);padding:1px 7px;border-radius:5px;font-size:11px;letter-spacing:.02em}
#liveDm .sc .bd{padding:6px 9px;font-size:12.5px;line-height:1.5;color:#f2f6f9;background:rgba(0,0,0,.34)}
@keyframes scin{from{opacity:0;transform:translateX(-14px) scale(.96)}to{opacity:1;transform:none}}

/* 底部：发弹幕 / 发 SC */
#liveInput{position:absolute;left:4.5%;right:4.5%;bottom:14px;z-index:14;align-items:center;gap:7px}
#liveNick{flex-shrink:0;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 9px;height:34px;line-height:34px;
  border-radius:9px;background:rgba(12,16,22,.62);border:1px solid rgba(255,255,255,.14);color:var(--main);font-size:11.5px;font-weight:600;cursor:pointer;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#liveText{flex:1;min-width:0;height:34px;padding:0 12px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:rgba(12,16,22,.62);
  color:#eef3f7;font-size:13px;font-family:inherit;outline:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#liveText::placeholder{color:rgba(230,240,246,.4)}
#liveText:focus{border-color:var(--main)}
#liveSc{flex-shrink:0;height:34px;padding:0 6px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:rgba(12,16,22,.72);
  color:#eef3f7;font-size:12px;font-family:inherit;cursor:pointer;outline:none}
#liveSc option{background:#141a22;color:#eef3f7}
#liveSend{flex-shrink:0;height:34px;padding:0 15px;border-radius:9px;border:none;background:var(--main);color:#0d2730;font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(141,212,224,.35)}
#liveSend:active{transform:translateY(1px)}
#liveSend.ok{background:#7ddc9a}

/* 回放条（从小手机点进来的历史直播） */
#liveReplay{position:absolute;bottom:14px;left:4.5%;right:4.5%;z-index:15;align-items:center;gap:10px;padding:0 13px;height:36px;border-radius:10px;
  background:rgba(12,16,22,.72);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
  color:#dfe8ef;font-size:12.5px;font-weight:600}
#liveReplay b{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--main);font-weight:600}

    try{cands.push(getVariables({type:'message'}));}catch(e1){}   // 兜底：不带 id（酒馆通常给最后一条）
    try{cands.push(getVariables({type:'chat'}));}catch(e2){}
    try{cands.push(getVariables());}catch(e3){}
    for(var i=0;i<cands.length;i++){ var v=cands[i]; if(!v) continue;
      var l=digAny(v,'地点');
      if(nonEmpty(l)) return norm(digAny(v,'时间.天数'),digAny(v,'时间.时段'),l,digAny(v,'名气.阶段')); }
  } }catch(e){}
  // 源②：MVU 官方 API（内部自己处理 stat_data）
  try{ if(typeof Mvu!=='undefined'&&Mvu.getMvuVariable){ var l2=Mvu.getMvuVariable('地点');
    if(nonEmpty(l2)) return norm(Mvu.getMvuVariable('时间.天数'),Mvu.getMvuVariable('时间.时段'),l2,Mvu.getMvuVariable('名气.阶段')); } }catch(e){}
  // 源③：getvar（STscript 变量），stat_data 前缀 + 顶层都试
  try{ if(typeof getvar==='function'){ var l3=getvar('stat_data.地点')||getvar('地点');
    if(nonEmpty(l3)) return norm(getvar('stat_data.时间.天数')||getvar('时间.天数'),getvar('stat_data.时间.时段')||getvar('时间.时段'),l3,getvar('stat_data.名气.阶段')||getvar('名气.阶段')); } }catch(e){}
  return FAKE_MVU;
}

/* ===== ③ 解析 ===== */
function parseGal(raw){
  var m=raw.match(/<Gal>([\s\S]*?)<\/Gal>/); if(m) raw=m[1];
  var r={modules:[],env:"",inner:"",choices:[],live:null,image:null}, mode="", cgScene=null;
  /* 文生图 prompt：<image>image###…###</image>，【跨三行】。必须在行循环【之前】整块抠掉，
     否则里面的 "Character 1 Prompt:…|centers:c3;" 含 | ，会被当成对话行切碎。 */
  var im=raw.match(/<image>([\s\S]*?)<\/image>/i);
  if(im){ r.image=im[1].replace(/^\s*image\s*###/i,"").replace(/###\s*$/,"").trim(); raw=raw.replace(im[0],""); }
  raw.split(/\r?\n/).forEach(function(line){
    line=line.trim(); if(!line) return; var x;
    /* 直播模式：<live>形式|背景</live>（形式=唱歌/杂谈，背景=录音室/宿舍）。有这行 = 整轮进直播模式 */
    if(x=line.match(/^<live>([\s\S]*?)<\/live>$/)){ var p=x[1].split('|');
      r.live={form:(p[0]||"杂谈").trim(), bg:(p[1]||"宿舍").trim(), title:(p[2]||"").trim()}; return; }
    if(x=line.match(/^<dm>([\s\S]*?)<\/dm>$/)){ var p=x[1].split('|');                      // 弹幕：ID|内容
      r.modules.push({type:"dm", who:(p[0]||"?").trim(), text:(p.slice(1).join('|')||"").trim()}); return; }
    if(x=line.match(/^<sc>([\s\S]*?)<\/sc>$/)){ var p=x[1].split('|');                      // 醒目留言：ID|金额|内容
      r.modules.push({type:"sc", who:(p[0]||"?").trim(), yen:(+((p[1]||"").trim())||30), text:(p.slice(2).join('|')||"").trim()}); return; }
    if(x=line.match(/^<env>([\s\S]*?)<\/env>$/)){ r.env=x[1].trim(); return; }
    if(x=line.match(/^<inner>([\s\S]*?)<\/inner>$/)){ r.inner=x[1].trim(); return; }
    if(x=line.match(/^<cg=([\s\S]*?)>$/)){ cgScene=x[1].trim(); return; }   // 自动CG场景 开始：这段话铺CG直到 </cg>
    if(line==="</cg>"){ cgScene=null; return; }                              // 自动CG场景 结束
    if(x=line.match(/^<cg>([\s\S]*?)<\/cg>$/)){ var p=x[1].split('|'); r.modules.push({type:"cg",name:p[0].trim(),tag:(p[1]||"").trim()}); return; }
    if(x=line.match(/^<choice>(.*)<\/choice>$/)){ (x[1].match(/\[([^\]]*)\]/g)||[]).forEach(function(c){r.choices.push(c.replace(/^\[|\]$/g,""));}); return; }
    if(line==="<choice>"){mode="choice";return;} if(line==="</choice>"){mode="";return;}
    if(mode==="choice"){ r.choices.push(line.replace(/^\[|\]$/g,"")); return; }
    if(line.indexOf("|")>-1){ var f=line.split("|"); r.modules.push({type:"line",text:(f[0]||"").trim(),who:(f[1]||"").trim(),expr:(f[2]||"").trim(),dialogue:/^「[\s\S]*」$/.test((f[0]||"").trim()),cg:cgScene}); }
  });
  return r;
}

   这里负责给它找一张不违和的背景。三层：

   ① LOC_HINT 关键词猜测：能猜出来就用最贴切的真地点（校门口→校园、便利店→商业街、练习室→录音室）。

function hashPick(seed,arr){ if(!arr||!arr.length) return null;
  var h=0; for(var i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))|0;
  return arr[Math.abs(h)%arr.length]; }

  return hashPick(loc,LOC_ALL); }

  if(!url){ var proxy=guessLoc(loc); if(proxy) url=bgOf(proxy,band); }           // ② 名单外地点：关键词猜 → 猜不出就哈希锁定，都稳定不跳图

    L.classList.toggle("off",!!atStart); R.classList.toggle("off",!!atEnd);
  }
  L.onclick=function(e){ e.stopPropagation(); step(-1); };
  R.onclick=function(e){ e.stopPropagation(); step(1); };
  window.__tqNav={ refresh:refresh };           // 供 advance/CG模式 调用刷新箭头状态
  refresh();
})();

/* ===== CG 手动切换模式（独立于 🎨 调节器）=====
   立绘⇄CG 一个独立按钮(贴🎨正下方)。CG 模式：满屏当前 CG + 藏对话框/状态框 + 文字压图(后句盖前句) + 底部 ‹N/M› 回看。
   显示哪张 CG：默认取本轮 <cg>，没有就用 cgLibrary 第一张；也可用🎨面板 CG 行换图/退出。
   —— 对接未来「世界书强制每轮选一张 CG」：到时点按钮＝动立绘 ⇄ 静 CG + 动对话。 */
(function(){
  var stage=$("stage"); if(!stage) return;
  var cgViewMode=false, cgLines=[], cgPos=0, curCg=null;

  function roundCg(){ for(var i=0;i<data.modules.length;i++){ if(data.modules[i].type==="cg") return data.modules[i].name; } for(var i=0;i<data.modules.length;i++){ if(data.modules[i].cg) return data.modules[i].cg; } var ks=Object.keys(cgLibrary); return ks.length?ks[0]:null; }
  function buildLines(){ cgLines=[]; for(var i=0;i<data.modules.length;i++){ if(data.modules[i].type==="line") cgLines.push(i); } }        // 收集对话/旁白行(跳过cg模块)
  function mIdx2pos(i){ var b=0; for(var j=0;j<cgLines.length;j++){ if(cgLines[j]<=i) b=j; else break; } return b; }                      // 立绘模块下标 → 句子下标(≤当前最近一句)

  function paintCg(name){ var url=cgLibrary[name];
    if(url){ $("cgbg").style.backgroundImage='url("'+url+'")'; $("cgmain").style.backgroundImage='url("'+url+'")'; $("cgPh").style.display="none"; }
    else{ $("cgbg").style.backgroundImage=""; $("cgmain").style.backgroundImage=""; $("cgPh").style.display="flex"; $("cgPh").textContent="〔 CG 占位："+name+" 〕"; }
    curCg=name; }

  function paintLine(){ var line=$("cgLine"), spk=$("cgSpk");
    if(!cgLines.length){ spk.className=""; spk.textContent=""; line.className="narr"; line.textContent="（本轮没有可显示的对话）"; $("cgNavCur").textContent="0"; $("cgNavTot").textContent="0"; $("cgPrev").disabled=true; $("cgNext").disabled=true; return; }
    var mod=data.modules[cgLines[cgPos]];
    line.style.animation="none"; void line.offsetWidth; line.style.animation="";                 // 重触发淡入
    if(mod.dialogue){ spk.className="on"; spk.textContent=mod.who||"？"; line.className=(mod.who==="天青")?"tq":""; }
    else{ spk.className=""; spk.textContent=""; line.className="narr"; }
    line.textContent=mod.text;
    $("cgNavCur").textContent=(cgPos+1); $("cgNavTot").textContent=cgLines.length;
    $("cgPrev").disabled=(cgPos<=0); $("cgNext").disabled=(cgPos>=cgLines.length-1); }

  function go(d){ if(!cgViewMode||!cgLines.length) return; var n=cgPos+d; if(n<0||n>=cgLines.length) return; cgPos=n; paintLine(); if(window.__tqNav) window.__tqNav.refresh(); }

  function enter(name){ var wasIn=cgViewMode; buildLines(); cgViewMode=true;
    clearInterval(typer); typing=false;                    // 停掉立绘打字机
    if(cgActive) hideCG();                                  // 清掉立绘模式的瞬时 CG 态
    if(!wasIn) cgPos=mIdx2pos(idx);                         // 仅首次进入对齐进度；已在 CG 模式只换图不动位置
    paintCg(name||curCg||roundCg());
    $("sprites").style.display="none"; $("cg").classList.add("show"); stage.classList.add("cgmode");
    paintLine(); setTog(); if(window.__tqNav) window.__tqNav.refresh(); }

  function exit(){ cgViewMode=false;
    stage.classList.remove("cgmode"); $("cg").classList.remove("show"); $("sprites").style.display="block";
    if(cgLines.length) idx=cgLines[cgPos];                  // 回到当前句对应的立绘位置
    lastExpr=null; render(); setTog(); if(window.__tqNav) window.__tqNav.refresh(); }   // 强制重画立绘

  // 独立切换按钮（贴🎨正下方；想挪去右上角改 top/left 一行即可）
  var tbtn=document.createElement('div'); tbtn.id='cgTog'; tbtn.title='切换 立绘 / CG';
  tbtn.style.cssText='position:absolute;top:12px;left:12px;z-index:21;height:34px;padding:0 11px;display:flex;align-items:center;gap:5px;background:rgba(18,24,32,.55);border:1px solid rgba(255,255,255,.2);border-radius:9px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 6px 18px rgba(0,0,0,.4);cursor:pointer;font-size:13px;font-weight:600;color:#eef2f6;user-select:none;white-space:nowrap';
  function setTog(){ tbtn.textContent = cgViewMode ? '🎭 立绘' : '🖼 CG'; }
  setTog();
  tbtn.onclick=function(e){ e.stopPropagation(); if(cgViewMode) exit(); else enter(); };
  stage.appendChild(tbtn);

  $("cg").addEventListener("click",function(e){ if(cgViewMode){ e.stopPropagation(); go(1); } else if(autoCg!==null){ e.stopPropagation(); advance(); } });   // 点图前进(手动CG回看 / 自动CG推进)
  $("cgPrev").addEventListener("click",function(e){ e.stopPropagation(); go(-1); });
  $("cgNext").addEventListener("click",function(e){ e.stopPropagation(); go(1); });

  window.__tqCg={ enter:enter, exit:exit, inMode:function(){return cgViewMode;},
    go:go, pos:function(){ return {cur:cgPos,total:cgLines.length}; } };   // go/pos 供左右箭头调用
})();

/* ==================================================================
   直播模式 —— AI 吐 <live> 就整轮切成 B站直播间
   ------------------------------------------------------------------
   · 不新开正则：还是同一套 <Gal> 差分，只是引擎换个渲染分支。
   · 弹幕【自动连播】：一次 advance 连续吐弹幕/SC，遇到天青说话才停（打字机）。
   · 人数/热度【前端按名气阶段算】，不让 AI 写 —— 数据必定符合阶段，且随推进缓慢上涨。
   · {{user}} 发弹幕 → 填进酒馆输入框 [弹幕|ID|内容]，填不进去退回剪贴板。
   · 回放：小手机写 localStorage['tq_live_replay'] → 最新的那个 gal iframe 接管。
   ================================================================== */
(function(){
  registerLatest();                                                // 先登记自己，isLatest() 才判断得对
  var stage=$("stage"); if(!stage||!data.live) return;
  clearInterval(typer); typing=false;                              // 停掉立绘模式已经起跑的打字机

  /* --- 各阶段的直播量级（抄自世界书〈名气系统〉，改那边记得同步这里）--- */
  var STAGE={
    "地下偶像期":{v:[30,80],   peak:150,   heat:[500,2000],    hu:"" },
    "正式出道期":{v:[150,400], peak:800,   heat:[5000,15000],  hu:"" },
    "MV突破期":  {v:[500,1500],peak:3500,  heat:[20000,60000], hu:"万"},
    "专辑稳定期":{v:[1500,4000],peak:8000, heat:[50000,150000],hu:"万"}
  };
  /* SC 档位配色（B站真实的醒目留言分档）*/
  var SC_TIERS=[[2000,"#ab1a32"],[1000,"#e54d60"],[500,"#e09443"],[100,"#e2b52b"],[50,"#427d9e"],[0,"#2a60b2"]];
  function scColor(y){ for(var i=0;i<SC_TIERS.length;i++) if(y>=SC_TIERS[i][0]) return SC_TIERS[i][1]; return SC_TIERS[5][1]; }
  /* 时段 → 一个具体钟点（同一场固定，靠哈希，不会每次重绘都跳） */
  var CLOCK={清晨:[6,8],上午:[9,11],午后:[13,17],傍晚:[18,19],夜晚:[20,22],深夜:[23,25]};

  var v=readMVU(), st=STAGE[v.阶段]||STAGE["地下偶像期"];
  var seed=(data.live.form+data.live.bg+(data.modules[0]&&data.modules[0].text||"")).slice(0,40);
  function h(s,n){ var x=0; for(var i=0;i<s.length;i++) x=(x*31+s.charCodeAt(i))|0; return Math.abs(x)%n; }   // 确定性伪随机
  var nDone=0, nTotal=data.modules.length||1;

  function fmt(n){ return n>=10000?(n/10000).toFixed(1)+"万":(n>=1000?n.toLocaleString():String(n)); }
  function paintBar(){
    var cr=CLOCK[v.时段]||[21,22], hh=(cr[0]+h(seed,Math.max(1,cr[1]-cr[0])))%24, mm=h(seed+"m",60);
    $("liveClock").textContent=("0"+hh).slice(-2)+":"+("0"+mm).slice(-2);
    var lo=st.v[0]+h(seed+"v",Math.max(1,st.v[1]-st.v[0])>>1);          // 起始同接（同一场固定）
    var grow=(st.peak-lo)*0.55*(nDone/nTotal);                            // 随推进往峰值爬 —— 观众越聚越多
    $("liveViewers").textContent="👤 "+fmt(Math.round(lo+grow));
    var hb=st.heat[0]+h(seed+"h",st.heat[1]-st.heat[0]);
    $("liveHeat").textContent="🔥 "+fmt(Math.round(hb*(0.7+0.5*nDone/nTotal)));
  }

  /* --- 弹幕框 --- */
  var box=$("liveDm");
  function pushDm(m){
    var el=document.createElement("div");
    if(m.type==="sc"){
      var c=scColor(m.yen);
      el.className="sc"; el.style.background=c;
      var top=document.createElement("div"); top.className="top";
      var y=document.createElement("span"); y.className="y"; y.textContent="¥"+m.yen;
      var n=document.createElement("span"); n.textContent=m.who;                 // textContent 防注入
      top.appendChild(y); top.appendChild(n);
      var bd=document.createElement("div"); bd.className="bd"; bd.textContent=m.text;
      el.appendChild(top); el.appendChild(bd);
    } else {
      el.className="dm"+(m.me?" me":"");
      var n2=document.createElement("span"); n2.className="n"; n2.textContent=m.who;
      var t2=document.createElement("span"); t2.textContent=m.text;
      el.appendChild(n2); el.appendChild(t2);
    }
    box.appendChild(el); box.scrollTop=box.scrollHeight;
    while(box.children.length>60) box.removeChild(box.firstChild);              // 别让 DOM 无限长
  }
  function sysDm(t){ var e=document.createElement("div"); e.className="dm sys"; e.textContent=t; box.appendChild(e); box.scrollTop=box.scrollHeight; }

  /* --- 天青字幕（后一句盖前一句，打字机）--- */
  var sub=$("liveSub"), subTimer=null, subTyping=false;
  function paintSub(mod){
    clearInterval(subTimer); subTyping=true;
    sub.className=mod.dialogue?"":"narr";
    sub.style.animation="none"; void sub.offsetWidth; sub.style.animation="";   // 重触发淡入
    var full=mod.text, i=0; sub.textContent="";
    subTimer=setInterval(function(){ i++; sub.textContent=full.slice(0,i);
      if(i>=full.length){ clearInterval(subTimer); subTyping=false; } },26);
  }

  /* --- 推进：弹幕自动连播，遇到天青说话才停 --- */
  var li=0, chaining=false;
  function step(){
    if(li>=data.modules.length){ chaining=false; $("hint")&&($("hint").textContent=""); sysDm("—— 直播继续中 · 发条弹幕她就会回你 ——"); nDone=nTotal; paintBar(); return; }
    var mod=data.modules[li];
    nDone=li; paintBar();
    if(mod.type==="dm"||mod.type==="sc"){                        // 弹幕/SC：吐出来，接着自动连下一条
      pushDm(mod); li++;
      chaining=true; setTimeout(step, mod.type==="sc"?620:380);
      return;
    }
    if(mod.type==="line"){                                        // 天青/旁白说话：停下来，等点击
      chaining=false;
      if(mod.who==="天青"&&mod.expr&&mod.expr!=="-") setSprite(mod.expr);
      paintSub(mod); li++;
      return;
    }
    li++; step();                                                // cg 等模块在直播里忽略
  }
  function liveAdvance(){
    if(chaining) return;                                          // 连播中：点了也不打断
    if(subTyping){ clearInterval(subTimer); subTyping=false;      // 打字机没打完 → 先补全
      var p=data.modules[li-1]; if(p&&p.type==="line") sub.textContent=p.text; return; }
    step();
  }

  /* --- {{user}} 发弹幕 / SC --- */
  var NICK_LS="tq_live_nick";
  var nick=$("liveNick"), inp=$("liveText"), sel=$("liveSc"), btn=$("liveSend");
  try{ nick.textContent=localStorage.getItem(NICK_LS)||"匿名的听众"; }catch(e){}
  nick.onclick=function(e){ e.stopPropagation();
    var n=prompt("你在直播间用的马甲 ID（天青认不认得出来，看她的）：", nick.textContent);
    if(n&&n.trim()){ nick.textContent=n.trim().slice(0,12); try{localStorage.setItem(NICK_LS,nick.textContent);}catch(e){} } };
  [inp,sel].forEach(function(el){ el.addEventListener("click",function(e){e.stopPropagation();}); });
  inp.addEventListener("keydown",function(e){ e.stopPropagation(); if(e.key==="Enter") send(); });

  /* 送达：优先塞进酒馆输入框（同源 window.top，小手机也是这么干的）；不行就退回剪贴板 */
  function toTavern(t){
    try{
      var doc=window.top.document;
      var ta=doc.querySelector("#send_textarea")||doc.querySelector("textarea#send_textarea")||doc.querySelector(".mes_text_input");
      if(ta){ ta.value=t; ta.dispatchEvent(new Event("input",{bubbles:true})); ta.focus(); return "填进输入框了，回车发送"; }
    }catch(e){}
    copyTxt(t); return "已复制，粘到输入框发送";
  }
  function send(e){ if(e) e.stopPropagation();
    var t=inp.value.trim(); if(!t) return;
    var yen=+sel.value||0, id=nick.textContent;
    pushDm(yen?{type:"sc",who:id,yen:yen,text:t,me:1}:{type:"dm",who:id,text:t,me:1});   // 先本地上屏，立刻有反馈
    var payload = yen ? "[SC|"+id+"|"+yen+"|"+t+"]" : "[弹幕|"+id+"|"+t+"]";
    var msg=toTavern(payload);
    inp.value=""; sel.value="0";
    var old=btn.textContent; btn.textContent="✓"; btn.classList.add("ok");
    sysDm(msg);
    setTimeout(function(){ btn.textContent=old; btn.classList.remove("ok"); },1400);
  }
  btn.onclick=send;

  /* --- 启动直播模式 --- */
  stage.classList.add("live");
  $("liveTitle").textContent=(data.live.form||"杂谈")+" · "+(data.live.bg||"宿舍")+(data.live.title?" · "+data.live.title:"");
  (function(){                                                       // 直播条：点一下收起/展开（收起后只剩 🔴LIVE）
    var st=$("stage"), bar=$("liveBar"), LS="tq_gal_barmin";
    function apply(m){ st.classList.toggle("barmin",m); bar.title=m?"点一下展开":"点一下收起"; }
    try{ apply(localStorage.getItem(LS)==="1"); }catch(e){ apply(false); }
    bar.onclick=function(e){ e.stopPropagation();
      var m=!st.classList.contains("barmin"); apply(m);
      try{ localStorage.setItem(LS,m?"1":"0"); }catch(e2){} };
  })();
  (function(){                                                       // 弹幕框：点 💬 收起/展开。收起后按钮挪到左下角当入口
    var st=$("stage"), tog=$("dmTog"), LS="tq_gal_dmoff";
    function apply(off){ st.classList.toggle("dmoff",off);
      tog.textContent = off ? "💬" : "✕";
      tog.title = off ? "展开弹幕" : "收起弹幕"; }
    try{ apply(localStorage.getItem(LS)==="1"); }catch(e){ apply(false); }
    tog.onclick=function(e){ e.stopPropagation();
      var off=!st.classList.contains("dmoff"); apply(off);
      try{ localStorage.setItem(LS,off?"1":"0"); }catch(e2){} };
  })();
  // 直播背景钉死在 <live> 给的那个地点（下面直接铺，不经 MVU）
  var band=TIME_BAND[v.时段]||"白日";
  var url=bgOf(data.live.bg,band)||bgOf("宿舍",band);
  if(url) $("bg").style.background='center/cover no-repeat url("'+url+'")';
  paintBar(); sysDm("—— 直播开始 ——");
  $("dialogue").removeEventListener("click",advance);              // 直播模式接管点击推进
  stage.addEventListener("click",liveAdvance);
  step();

  /* ================= 回放（从小手机点进来）=================
     所有 gal iframe 都会收到 storage 事件，但只有【最新那条消息】的 gal 该响应。
     每个 iframe 启动时把自己写进 window.top.__tqGalLatest，后启动的覆盖先启动的 = 最新的赢。 */
  window.__tqLive={ replay:doReplay };
  function isLatest(){ try{ return window.top.__tqGalLatest===window; }catch(e){ return true; } }
  function doReplay(show){
    if(!show){ stage.classList.remove("replay"); return; }
    data=parseGal(show.raw); if(!data.live) return;
    box.innerHTML=""; li=0; chaining=false; nDone=0; nTotal=data.modules.length||1;
    v=readMVU(); st=STAGE[show.stage]||st; seed=(show.id||"")+show.form;
    stage.classList.add("replay");
    $("liveReplayT").textContent=(show.form||"")+" · "+(show.title||show.when||"");
    $("liveTitle").textContent=(show.form||"杂谈")+" · "+(show.bg||"宿舍");
    var u2=bgOf(show.bg,TIME_BAND[v.时段]||"白日")||bgOf("宿舍","夜晚");
    if(u2) $("bg").style.background='center/cover no-repeat url("'+u2+'")';
    paintBar(); sysDm("—— 回放 · 这场播完了 ——"); step();
  }
  $("liveBack").onclick=function(e){ e.stopPropagation();
    try{ localStorage.removeItem("tq_live_replay"); }catch(e){}
    location.reload();                                             // 最省事：重载 iframe 回到本轮内容
  };
  window.addEventListener("storage",function(e){
    if(e.key!=="tq_live_replay"||!e.newValue||!isLatest()) return;
    try{ doReplay(JSON.parse(e.newValue)); }catch(err){}
  });
  try{ var pend=localStorage.getItem("tq_live_replay"); if(pend&&isLatest()) doReplay(JSON.parse(pend)); }catch(e){}
})();

/* 每个 gal iframe 启动时登记自己 —— 最后启动的 = 最新消息的 gal，回放只让它响应 */
function registerLatest(){ try{ window.top.__tqGalLatest=window; }catch(e){} }
})();
</script>
</body>
